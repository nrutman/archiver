<VirtualHost *:80>
    ServerName archiver.example.com
    DocumentRoot /var/www/archiver/public

    <Directory /var/www/archiver/public>
        AllowOverride None
        Require all granted
        FallbackResource /index.php
    </Directory>

    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php-fpm.sock|fcgi://localhost/"
    </FilesMatch>

    LimitRequestBody 230686720

    ErrorLog ${APACHE_LOG_DIR}/archiver_error.log
    CustomLog ${APACHE_LOG_DIR}/archiver_access.log combined
</VirtualHost>
