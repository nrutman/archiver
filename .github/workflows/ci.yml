name: CI

on:
    pull_request:
    push:
        branches:
            - main

permissions:
    contents: read

jobs:
    php:
        name: PHP checks
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  extensions: ctype, fileinfo, iconv, intl, mbstring, openssl, zip
                  coverage: none
                  tools: composer:v2

            - name: Validate Composer metadata
              run: composer validate --strict

            - name: Install Composer dependencies
              run: composer install --prefer-dist --no-progress --no-interaction

            - name: Run PHP checks
              run: composer check

    frontend:
        name: TypeScript checks
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.33.2

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint frontend
              run: pnpm lint

            - name: Check frontend formatting
              run: pnpm format:check

            - name: Type-check frontend
              run: pnpm typecheck

            - name: Test frontend
              run: pnpm test

            - name: Build frontend assets
              run: pnpm build

            - name: Check committed frontend assets
              run: |
                  if [ -n "$(git status --porcelain -- public/build)" ]; then
                      git status --short -- public/build
                      echo "::error::public/build is out of date. Run pnpm build and commit public/build, or configure BUILT_ASSETS_COMMIT_TOKEN so CI can update same-repository PR branches."
                      exit 1
                  fi
